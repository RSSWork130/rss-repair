<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSS Work Orders — Mechanic View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');
  :root {
    --rss-blue:#1a3a6b; --rss-blue-mid:#1e4a8c; --rss-blue-light:#e8eef7;
    --accent:#c8000a; --border:#b0bac8; --text:#1a1a1a; --label:#3a4a60;
    --green:#1a7a3a; --yellow:#b87800;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Barlow',sans-serif; background:#dde3ec; min-height:100vh; color:var(--text); }

  /* HEADER */
  .header { background:var(--rss-blue); display:flex; align-items:center; gap:20px; padding:14px 28px; }
  .logo-box { background:#fff; border-radius:4px; padding:6px 10px; }
  .logo-text { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; color:var(--rss-blue); letter-spacing:0.06em; }
  .header-title { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; color:#fff; letter-spacing:0.04em; text-transform:uppercase; }
  .header-sub { font-size:10px; color:#a0b8d8; margin-top:2px; letter-spacing:0.08em; text-transform:uppercase; }

  /* NAV */
  .nav-bar { background:#122b52; display:flex; gap:2px; padding:0 28px; }
  .nav-bar a { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.08em;
    text-transform:uppercase; color:#a0b8d8; text-decoration:none; padding:9px 16px; display:block; border-bottom:3px solid transparent; }
  .nav-bar a.active { color:#fff; border-bottom-color:#c8000a; }
  .nav-bar a:hover { color:#fff; }

  /* MAIN */
  .main { max-width:700px; margin:0 auto; padding:28px 20px; }
  .page-title { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:700; color:var(--rss-blue);
    letter-spacing:0.04em; text-transform:uppercase; margin-bottom:20px; }

  /* MECHANIC SELECTOR */
  .mechanic-select-wrap { background:#fff; border:1px solid var(--border); border-radius:6px; padding:20px 24px; margin-bottom:24px; }
  .mechanic-select-wrap label { font-size:12px; font-weight:700; color:var(--label); text-transform:uppercase;
    letter-spacing:0.06em; display:block; margin-bottom:8px; }
  .mechanic-select-wrap select { font-family:'Barlow',sans-serif; font-size:15px; border:1.5px solid var(--border);
    border-radius:4px; padding:9px 12px; width:100%; color:var(--text); background:#fff; }
  .mechanic-select-wrap select:focus { outline:2px solid var(--rss-blue-mid); border-color:transparent; }

  /* WORK ORDER CARD */
  .wo-card { background:#fff; border:1px solid var(--border); border-radius:6px; margin-bottom:16px; overflow:hidden; }
  .wo-card-header { background:var(--rss-blue-light); padding:12px 18px; display:flex; align-items:center;
    gap:14px; cursor:pointer; user-select:none; }
  .wo-card-header:hover { background:#dae4f3; }
  .wo-num { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; color:var(--rss-blue); }
  .wo-vehicle { font-weight:600; font-size:14px; flex:1; }
  .wo-truck { font-size:13px; color:var(--label); }
  .badge { display:inline-block; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700;
    letter-spacing:0.06em; text-transform:uppercase; padding:3px 9px; border-radius:3px; }
  .badge-High { background:#fde8e8; color:#c8000a; }
  .badge-Normal { background:#e8f4ea; color:#1a7a3a; }
  .badge-Low { background:#e8eef7; color:#1a3a6b; }
  .chevron { font-size:14px; color:var(--label); transition:transform 0.2s; }
  .chevron.open { transform:rotate(180deg); }

  /* CARD BODY */
  .wo-card-body { padding:18px 20px; border-top:1px solid #e8eef7; display:none; }
  .wo-card-body.open { display:block; }
  .info-row { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:14px; }
  .info-item { display:flex; flex-direction:column; gap:3px; }
  .info-item span:first-child { font-size:10px; font-weight:700; color:var(--label); text-transform:uppercase; letter-spacing:0.06em; }
  .info-item span:last-child { font-size:13px; font-weight:500; }
  .desc-box { background:#f8f9fb; border:1px solid #e0e6ef; border-radius:4px; padding:12px 14px;
    font-size:13px; color:var(--text); margin-bottom:18px; line-height:1.5; }
  .field-label { font-size:11px; font-weight:700; color:var(--label); text-transform:uppercase;
    letter-spacing:0.06em; display:block; margin-bottom:6px; margin-top:14px; }
  .field-label:first-child { margin-top:0; }
  textarea { width:100%; font-family:'Barlow',sans-serif; font-size:13px; border:1.5px solid var(--border);
    border-radius:4px; padding:9px 12px; resize:vertical; min-height:70px; }
  textarea:focus { outline:2px solid var(--rss-blue-mid); border-color:transparent; }
  input[type="date"], input[type="text"] { font-family:'Barlow',sans-serif; font-size:13px;
    border:1.5px solid var(--border); border-radius:4px; padding:9px 12px; width:100%; }
  input:focus { outline:2px solid var(--rss-blue-mid); border-color:transparent; }

  /* SIGNATURE */
  .sig-wrap { border:1.5px solid var(--border); border-radius:4px; overflow:hidden; position:relative; }
  canvas { display:block; width:100%; height:120px; background:#fff; touch-action:none; cursor:crosshair; }
  .sig-clear { position:absolute; top:6px; right:8px; font-size:11px; font-weight:700; color:var(--label);
    cursor:pointer; background:#f0f2f5; border:1px solid var(--border); border-radius:3px; padding:3px 8px; }
  .sig-clear:hover { background:#e0e4ea; }

  /* SUBMIT */
  .btn-complete { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.06em;
    text-transform:uppercase; background:var(--green); color:#fff; border:none; border-radius:5px;
    padding:12px 28px; cursor:pointer; width:100%; margin-top:18px; transition:background 0.15s; }
  .btn-complete:hover { background:#145e2c; }
  .btn-complete:disabled { opacity:0.5; cursor:not-allowed; }

  /* COMPLETED STATE */
  .completed-banner { background:#d1f0da; border:1px solid #a8ddb5; border-radius:4px; padding:12px 16px;
    color:#1a7a3a; font-weight:600; font-size:13px; text-align:center; margin-top:12px; }

  /* EMPTY */
  .empty-state { text-align:center; padding:60px 20px; color:#6a7a90; }
  .empty-state .icon { font-size:40px; margin-bottom:12px; }
  .loading { text-align:center; padding:40px; color:#6a7a90; }

  /* PRINT BUTTON */
  .btn-print { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.06em;
    text-transform:uppercase; background:#fff; color:var(--rss-blue); border:1.5px solid var(--rss-blue);
    border-radius:5px; padding:10px 28px; cursor:pointer; margin-top:10px; width:100%; transition:background 0.15s; }
  .btn-print:hover { background:var(--rss-blue-light); }

  /* PRINT STYLES */
  @media print {
    body { background:#fff !important; }
    .header, .nav-bar, .mechanic-select-wrap, .wo-card-header,
    .btn-complete, .btn-print, .sig-clear, .toast { display:none !important; }
    .wo-card { border:1px solid #999 !important; page-break-inside:avoid; margin-bottom:24px; box-shadow:none !important; }
    .wo-card-body { display:block !important; }
    .print-header { display:block !important; }
    textarea, input[type="date"], input[type="text"] { border:1px solid #ccc !important; }
    canvas { border:1px solid #ccc; }
    .main { padding:0 !important; max-width:100% !important; }
  }
  .print-header { display:none; padding:12px 18px 0 18px; border-bottom:2px solid var(--rss-blue-light); margin-bottom:4px; }
  .print-header .print-wo-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700;
    color:var(--rss-blue); text-transform:uppercase; letter-spacing:0.04em; }
  .print-header .print-wo-sub { font-size:12px; color:var(--label); margin-top:2px; margin-bottom:8px; }

  /* TOAST */
  .toast { position:fixed; bottom:28px; right:28px; background:#1a3a6b; color:#fff;
    font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.05em;
    padding:12px 22px; border-radius:6px; box-shadow:0 4px 18px rgba(0,0,0,0.22);
    opacity:0; transform:translateY(12px); transition:all 0.25s; pointer-events:none; z-index:999; }
  .toast.show { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="logo-box"><span class="logo-text">RSS</span></div>
  <div>
    <div class="header-title">Road Safety Systems</div>
    <div class="header-sub">Mechanic View</div>
  </div>
</div>

<div class="nav-bar">
  <a href="https://RSSwork130.github.io/rss-repair/index.html">New Work Order</a>
  <a href="https://RSSwork130.github.io/rss-repair/dashboard.html">Dashboard</a>
  <a href="https://RSSwork130.github.io/rss-repair/mechanic.html" class="active">Mechanic View</a>
</div>

<div class="main">
  <div class="page-title">My Work Orders</div>

  <div class="mechanic-select-wrap">
    <label for="mechanic-name">Select Your Name</label>
    <select id="mechanic-name" onchange="loadMyOrders()">
      <option value="">— Choose —</option>
      <option value="Maxx">Maxx</option>
      <option value="Dave">Dave</option>
    </select>
  </div>

  <div id="orders-container"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzOQPRE-Dp-QPC7E8k2ASM8lF1VYHgmLSwIwFwyMRz-PmiDITqjViLw226OFXwzyHcnIA/exec'; // same URL as dashboard

  // Signature canvases per WO
  const sigData = {};
  const sigDrawing = {};

  async function loadMyOrders() {
    const mechanic = document.getElementById('mechanic-name').value;
    const container = document.getElementById('orders-container');
    if (!mechanic) { container.innerHTML = ''; return; }

    container.innerHTML = '<div class="loading">Loading your work orders…</div>';

    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getAll`);
      const all = await res.json();

      // Only show Open orders assigned to this mechanic
      const mine = all.filter(o => o['Assigned To'] === mechanic && o['Status'] !== 'Complete');

      if (!mine.length) {
        container.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>No open work orders assigned to you.</p></div>`;
        return;
      }

      container.innerHTML = mine.map(o => buildCard(o)).join('');

      // Wire up signature canvases
      mine.forEach(o => {
        const woId = o['WO#'].replace(/[^a-z0-9]/gi, '_');
        initSignature(woId);
      });

    } catch (err) {
      container.innerHTML = '<div class="loading">Error loading orders. Check connection.</div>';
    }
  }

  function buildCard(o) {
    const woId = o['WO#'].replace(/[^a-z0-9]/gi, '_');
    return `
      <div class="wo-card" id="card-${woId}">
        <div class="print-header">
          <div class="print-wo-title">Work Order ${o['WO#']} — ${o['Make/Model'] || ''}</div>
          <div class="print-wo-sub">${o['Truck#'] ? 'Truck #' + o['Truck#'] + ' &nbsp;·&nbsp; ' : ''}Assigned To: ${o['Assigned To'] || ''} &nbsp;·&nbsp; Priority: ${o['Priority'] || 'Normal'} &nbsp;·&nbsp; Status: ${o['Status'] || 'Open'}</div>
        </div>
        <div class="wo-card-header" onclick="toggleCard('${woId}')">
          <span class="wo-num">${o['WO#']}</span>
          <span class="wo-vehicle">${o['Make/Model'] || ''}</span>
          ${o['Truck#'] ? `<span class="wo-truck">Truck #${o['Truck#']}</span>` : ''}
          <span class="badge badge-${o['Priority'] || 'Normal'}">${o['Priority'] || 'Normal'}</span>
          <span class="chevron" id="chev-${woId}">▼</span>
        </div>
        <div class="wo-card-body" id="body-${woId}">
          <div class="info-row">
            <div class="info-item"><span>Date</span><span>${o['Date Created'] || ''}</span></div>
            <div class="info-item"><span>Requested By</span><span>${o['Requested By'] || ''}</span></div>
            <div class="info-item"><span>Plate</span><span>${o['Plate'] || ''} ${o['State'] || ''}</span></div>
            <div class="info-item"><span>Mileage / Hrs</span><span>${o['Mileage/Hrs'] || ''}</span></div>
          </div>
          <div class="field-label">Work Requested</div>
          <div class="desc-box">${o['Description'] || '(No description)'}</div>
          ${o['Notes'] ? `<div class="field-label">Notes</div><div class="desc-box">${o['Notes']}</div>` : ''}
          <span class="field-label">Work Completed</span>
          <textarea id="wc-${woId}" placeholder="Describe what was done…"></textarea>
          <span class="field-label">Parts Used</span>
          <textarea id="parts-${woId}" placeholder="Part names, quantities…" style="min-height:50px;"></textarea>
          <span class="field-label">Mechanic Notes</span>
          <textarea id="mn-${woId}" placeholder="Any additional notes…" style="min-height:50px;"></textarea>
          <span class="field-label">Date Completed</span>
          <input type="date" id="dc-${woId}" value="${new Date().toISOString().slice(0,10)}">
          <div style="display:flex;align-items:center;gap:10px;margin:14px 0;">
            <input type="checkbox" id="svc-${woId}" onclick="toggleSvcMileage('${woId}')" style="width:18px;height:18px;">
            <label for="svc-${woId}" style="font-size:13px;font-weight:600;cursor:pointer;">This was a routine service (oil change, etc.) — update service tracking</label>
          </div>
          <div id="svc-mileage-wrap-${woId}" style="display:none;margin-bottom:14px;">
            <span class="field-label">Mileage / Hrs at Service</span>
            <input type="number" id="svcm-${woId}" placeholder="Current odometer / hour meter reading">
          </div>
          <span class="field-label" style="margin-top:14px;">Signature</span>
          <div class="sig-wrap">
            <canvas id="sig-${woId}" height="120"></canvas>
            <span class="sig-clear" onclick="clearSig('${woId}')">Clear</span>
          </div>
          <button class="btn-print" onclick="printOrder('${woId}')">🖨 Print This Work Order</button>
          <button class="btn-complete" onclick="submitComplete('${o['WO#']}', '${woId}', '${o['Vehicle ID']||''}')">Mark Complete ✓</button>
        </div>
      </div>
    `;
  }

  function toggleSvcMileage(woId) {
    const cb = document.getElementById(`svc-${woId}`);
    document.getElementById(`svc-mileage-wrap-${woId}`).style.display = cb.checked ? 'block' : 'none';
  }

  function printOrder(woId) {
    // Open the card if not already open so fields are visible when printing
    const body = document.getElementById(`body-${woId}`);
    const chev = document.getElementById(`chev-${woId}`);
    if (!body.classList.contains('open')) {
      body.classList.add('open');
      chev.classList.add('open');
    }
    // Hide all other cards, print, then restore
    const allCards = document.querySelectorAll('.wo-card');
    allCards.forEach(card => {
      if (card.id !== `card-${woId}`) card.style.display = 'none';
    });
    window.print();
    allCards.forEach(card => { card.style.display = ''; });
  }

  function toggleCard(woId) {
    const body = document.getElementById(`body-${woId}`);
    const chev = document.getElementById(`chev-${woId}`);
    body.classList.toggle('open');
    chev.classList.toggle('open');
  }

  // ── SIGNATURE ─────────────────────────────────────────────────────────────
  function initSignature(woId) {
    const canvas = document.getElementById(`sig-${woId}`);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * window.devicePixelRatio || 600;
    canvas.height = 120 * window.devicePixelRatio || 120;
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    ctx.strokeStyle = '#1a3a6b';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    let drawing = false;

    const getPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / (window.devicePixelRatio || 1) / rect.width;
      const scaleY = canvas.height / (window.devicePixelRatio || 1) / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    };

    canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    canvas.addEventListener('mouseup', () => { drawing = false; sigData[woId] = canvas.toDataURL(); });
    canvas.addEventListener('mouseleave', () => { drawing = false; });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
    canvas.addEventListener('touchend', () => { drawing = false; sigData[woId] = canvas.toDataURL(); });
  }

  function clearSig(woId) {
    const canvas = document.getElementById(`sig-${woId}`);
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    delete sigData[woId];
  }

  // ── SUBMIT COMPLETE ───────────────────────────────────────────────────────
  async function submitComplete(woNum, woId, vehicleId) {
    const workCompleted = document.getElementById(`wc-${woId}`).value.trim();
    const mechNotes     = document.getElementById(`mn-${woId}`).value.trim();
    const dateCompleted = document.getElementById(`dc-${woId}`).value;
    const signature     = sigData[woId] || '';
    const isService      = document.getElementById(`svc-${woId}`).checked;
    const completedMileage = isService ? document.getElementById(`svcm-${woId}`).value : '';

    if (!workCompleted) { showToast('Please describe the work completed.', true); return; }
    if (!signature)      { showToast('Please sign before submitting.', true); return; }
    if (isService && !completedMileage) { showToast('Please enter the mileage/hours for this service.', true); return; }

    const btn = document.querySelector(`#card-${woId} .btn-complete`);
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'complete', woNum, workCompleted, mechNotes, dateCompleted, signature, isService, completedMileage, vehicleId })
      });
      const data = await res.json();

      if (data.success) {
        btn.style.display = 'none';
        const banner = document.createElement('div');
        banner.className = 'completed-banner';
        banner.textContent = `✓ ${woNum} marked complete on ${dateCompleted}`;
        btn.parentNode.appendChild(banner);
        showToast(`${woNum} marked complete!`);
      } else {
        showToast('Error submitting. Try again.', true);
        btn.disabled = false;
        btn.textContent = 'Mark Complete ✓';
      }
    } catch (err) {
      showToast('Network error. Try again.', true);
      btn.disabled = false;
      btn.textContent = 'Mark Complete ✓';
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => { t.className = 'toast'; }, 3500);
  }
</script>
</body>
</html>
